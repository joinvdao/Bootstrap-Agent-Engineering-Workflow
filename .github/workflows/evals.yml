name: Evals

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  evals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run evals
        run: npm run run-evals
