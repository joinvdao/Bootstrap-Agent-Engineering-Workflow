name: Bug Report
description: Report a reproducible problem with the bootstrap prompt or generated workflow.
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      placeholder: |
        1. Use prompt with ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: I did not include secrets, private notes, local paths, or personal contact details.
          required: true
